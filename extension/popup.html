<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twitch Ads Blocker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Twitch Ads Blocker</h1>

      <label class="row" for="enabledToggle">
        <span>Ad Blocking</span>
        <input id="enabledToggle" type="checkbox" />
      </label>
      <label class="row" for="watchdogToggle">
        <span>Watchdog Recovery</span>
        <input id="watchdogToggle" type="checkbox" />
      </label>

      <p id="stateText" class="state"></p>
      <p id="engineVersion" class="meta">Engine version: loading...</p>
      <p id="conflictText" class="meta">Conflict check: waiting for Twitch tab data...</p>
      <p id="watchdogText" class="meta">Watchdog: waiting for Twitch tab data...</p>

      <button id="reloadBtn" type="button">Reload Twitch Tab</button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
